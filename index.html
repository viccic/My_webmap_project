<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>First WebMap</title>

	<link rel="stylesheet" href="styles.css">

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet.css">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
	<link rel="stylesheet" href="source/jquery-ui.min.css">
	<link rel="stylesheet" href="plugins/sidebar/L.Control.Sidebar.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
	<link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />
	<link rel="stylesheet" href="plugins/mouseposition/L.Control.MousePosition.css">
	<link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css"/>
	<link rel="stylesheet" href="plugins/minimap/Control.MiniMap.min.css">
	
	<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.0/leaflet-src.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"></script>
	<script src="source/jquery-ui.min.js"></script>
	<script src="plugins/sidebar/L.Control.Sidebar.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/leaflet-easybutton@2/src/easy-button.js"></script>
	<script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>
	<script src="plugins/mouseposition/L.Control.MousePosition.js"></script>
	<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.js"></script>
	<script src="plugins/minimap/Control.MiniMap.min.js"></script>
	<script src="plugins/ajax/leaflet.ajax.js"></script>

	<style>
		.bold {
			font-weight: bold;
			font-size: 16px;
		}

		.errorMsg {
			padding: 0;
			text-align: center;
			background-color: darksalmon;
		}
	</style>


</head>

<body>
    <div id="mapdiv"></div>

    <div id="sidebar" class="col-md-3">
	
	<!-- Road Name Part -->
		<div id="divRoadName" class="col-xs-12">

			<!-- Adding space above the title "Road Name Search" -->

			<div class="col-xs-12" style="height: 10px;"></div>

			<div class="col-xs-12">
				<p class="text-center bold">Road Name Search</p>
			</div>
			<div class="col-xs-12 errorMsg" id="road_error"></div>

			<!-- Adding space between the title "Road Name Search" and the buttons -->

			<div class="col-xs-12" style="height: 10px;"></div>

			<div class="form-group">
				<div class="col-xs-6">
					<input type="text" id="name_road" class="form-control" placeholder="Road Name">
				</div>
				<div class="col-xs-6">
					<button id="SearchRoadName" class="btn btn-primary btn-block">Find Road</button>
				</div>
			</div>

			<div class="col-xs-12" style="height: 20px;"></div>

			<div class="col-xs-12" id="road_information_n">
				
			</div>
			
		</div>
		
	<!-- Road ID Part -->
		<div id="divRoadID" class="col-xs-12">

			<!-- Adding space above the title "Road ID Search" -->

			<div class="col-xs-12" style="height: 10px;"></div>

			<div class="col-xs-12">
				<p class="text-center bold">Road ID Search</p>
			</div>
			<div class="col-xs-12 errorMsg" id="road_error"></div>

			<!-- Adding space between the title "Road ID Search" and the buttons -->

			<div class="col-xs-12" style="height: 10px;"></div>

			<div class="form-group">
				<div class="col-xs-6">
					<input type="text" id="id_road" class="form-control" placeholder="Road ID">
				</div>
				<div class="col-xs-6">
					<button id="SearchRoadID" class="btn btn-primary btn-block">Find Road</button>
				</div>
			</div>

			<div class="col-xs-12" style="height: 20px;"></div>

			<div class="col-xs-12" id="road_information_i">
				
			</div>
			
		</div>
	
	</div>

<script>
	var baseLayers;
    var overlays = {};
    var roads_array = [];
    var roads;
	var selected_roads;
	var lyrSearch_n;
	var lyrSearch_i;

    var mymap = L.map('mapdiv', {
        center: [52.0061, 4.3702],
        zoom: 14,
        attributionControl: false,
        zoomControl: false
    });

    var openStreetMap = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 23 });
    var CartoDB_Positron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 23 });
    var Esri_WorldImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 23 });
    var OpenTopoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 23 });

    openStreetMap.addTo(mymap);

    L.control.scale({
        position: 'bottomleft',
        maxWidth: 200,
        imperial: false
    }).addTo(mymap);

    var sidebar = L.control.sidebar('sidebar', { position: 'left' });
    mymap.addControl(sidebar);

    L.easyButton('glyphicon-transfer', function () {
        sidebar.toggle();
    }).addTo(mymap);

    baseLayers = {
        "OSM": openStreetMap,
        "CartoDB Positron": CartoDB_Positron,
        "Esri Imagery": Esri_WorldImagery,
        "Open Topo Map": OpenTopoMap
    };

    var control_layers = L.control.layers(baseLayers, overlays).addTo(mymap);
	
	// SEARCH ACCORDING TO NAME

    function style_roads(feature) {
        return {
            color: '#17202A',
            weight: 4
        };
    }

    function highlightFeature(e) {
        var layer = e.target;

        layer.setStyle({
            color: '#6baed6',
            weight: 6
        });

        layer.bringToFront();
    }

    function resetHighlight(e) {
        roads.resetStyle(e.target);
    }
	
	function resetRedHighlight(e) {
        var layer = e.target;

        layer.setStyle({
            color: 'red',
			weight: 10,
			opacity: 0.5
        });

        layer.bringToFront();
    }

    function SelectFeature(e) {
        var layer = e.target;
        var att = layer.feature.properties;

        layer.bindPopup(
            "Road ID: " + att.fid +
            "<br>Name: " + att.name +
            "<br>Length (m): " + Math.round(att.length * 1000)/1000
        ).openPopup();
    }

    function interaction_1(feature, layer) {
        var att = feature.properties;

        roads_array.push(att.fid);

        layer.on({
            mouseover: highlightFeature,
            mouseout: resetHighlight,
            click: SelectFeature
        });
    }
	
	 function interaction_2(feature, layer) {
        var att = feature.properties;

        roads_array.push(att.fid);

        layer.on({
            mouseover: highlightFeature,
            mouseout: resetRedHighlight,
            click: SelectFeature
        });
    }

    roads = new L.GeoJSON.AJAX('data/StreetsInDelft_roadnetwork.geojson', {
        style: style_roads,
        onEachFeature: interaction_1
    }).addTo(mymap);

    control_layers.addOverlay(roads, "OSM roads");   
	
	$("#SearchRoadName").click(function () {
		var name_road = $("#name_road").val();
		var lyr_n = returnLayerByAttribute_n(roads, "name", name_road);

		if (lyr_n) {
			var group = L.featureGroup(lyr_n);
			var list_id = [];
			var selectedFeatures = [];

			if (lyrSearch_n) {
				mymap.removeLayer(lyrSearch_n);
			}
			
			if (selected_roads) {
				mymap.removeLayer(selected_roads);
			}

			mymap.fitBounds(group.getBounds());
			roads.bringToFront();

			for (var i = 0; i < lyr_n.length; i++) {
				var att = lyr_n[i].feature.properties;
				list_id.push(att.fid);
				selectedFeatures.push(lyr_n[i].toGeoJSON());
			}

			selected_roads = L.geoJSON(selectedFeatures, {
				style: {
					color: 'red',
					weight: 10,
					opacity: 0.5
				},
				onEachFeature: interaction_2
			}).addTo(mymap);
			
			var att_first = lyr_n[0].feature.properties;

			$("#road_information_n").html(
				"Road ID(s): " + list_id.join(", ") + "<br>Name: " + att_first.name
			);

			$("#name_error").html("");
		} else {
			$("#name_error").html("Road not found!");
			$("#road_information_n").html("");

			//if (lyrSearch) {
				//mymap.removeLayer(lyrSearch);
			//}

			//if (selected_roads) {
				//mymap.removeLayer(selected_roads);
			//}
		}
	});
	
	// SEARCH ACCORDING TO ID
	$("#SearchRoadID").click(function () {
		var id_road = $("#id_road").val();
		var lyr_i = returnLayerByAttribute_i(roads, "fid", id_road);
	
		if (lyr_i) {
			var att = lyr_i.feature.properties;

			if (lyrSearch_i) {
				lyrSearch_i.remove();
			}

			// Before the leaflet object, we need to convert the layer into GeoJSON.

			lyrSearch_i = L.geoJSON(lyr_i.toGeoJSON(), {style:{color:'green', weight:10, opacity:0.5}}).addTo(mymap);

			mymap.fitBounds(lyr_i.getBounds());
			roads.bringToFront();

			$("#road_information_i").html("Road ID: " + att.fid +
            "<br>Name: " + att.name +
            "<br>Length (m): " + Math.round(att.length * 1000)/1000);
		} else {
			$("#road_error").html("Road not found!");
		}

	});

	// GENERAL FUNCTIONS
	function returnLayerByAttribute_n(layer, attribute_name, attribute_value) {
		var all_layers = layer.getLayers();
		var road_list = [];

		for (var i = 0; i < all_layers.length; i++) {
			var name_value = all_layers[i].feature.properties[attribute_name];

			if (name_value == attribute_value) {
				road_list.push(all_layers[i]);
			}
		}

		if (road_list.length > 0) {
			return road_list;
		}

		return false;
	}

	function returnLayerByAttribute_i(layer, attribute_name, attribute_value) {

			// console.log(layer);

			var all_layers = layer.getLayers();
			// console.log(all_layers);

			// [0].feature.properties

			for (var i=0; i<all_layers.length; i++) {
				var retained_value = all_layers[i].feature.properties[attribute_name];

				// console.log(retained_value);

				if (retained_value == attribute_value) {
					return all_layers[i];
				}
			}

			return false;
		}

	
</script>

</body>

</html>
